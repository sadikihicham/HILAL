name: EAS Update

# Publie le bundle JS (OTA) sur le projet EAS à chaque push sur master.
# Prérequis : ajouter le secret EXPO_TOKEN dans GitHub
# (Settings → Secrets and variables → Actions), généré sur
# expo.dev → Account → Settings → Access tokens.
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # Porte bloquante : type-check TypeScript strict (seule porte du repo).
  # Si elle échoue, l'OTA n'est PAS publiée (update a un `needs: typecheck`).
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  update:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Publish update
        run: eas update --branch preview --message "${{ github.event.head_commit.message }}" --non-interactive
